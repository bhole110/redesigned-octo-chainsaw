<meta charset="UTF-8">

<title>Join Official Channel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at top,#1f1f35,#0c0c14);
color:#fff;
overflow:hidden;
}

.container{
width:92%;
max-width:360px;
padding:26px 20px;
border-radius:20px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);} 
to{opacity:1;transform:translateY(0);}
}

.brand-title{
font-size:24px;
font-weight:800;
margin-bottom:16px;
background:linear-gradient(90deg,#ff416c,#ffcc70);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logo-container{
width:100px;
height:100px;
margin:0 auto 12px;
border-radius:50%;
overflow:hidden;
border:2px solid rgba(255,255,255,0.15);
box-shadow:0 0 20px rgba(255,75,43,.4);
}

.logo-container img{
width:100%;
height:100%;
object-fit:cover;
}

.bold-profit{
font-size:14px;
font-weight:700;
color:#ffcc70;
margin-bottom:10px;
letter-spacing:1px;
}

.timer-box{
font-size:26px;
font-weight:800;
margin:10px 0;
color:#ff416c;
}

.live-box{
font-size:13px;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
margin-bottom:16px;
opacity:.85;
}

.live-dot{
width:8px;height:8px;background:#ff3b3b;border-radius:50%;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:.3;}
100%{opacity:1;}
}

.counter-number{
font-weight:700;
color:#ffd54f;
}

.cta-btn{
width:100%;
padding:18px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:800;
cursor:pointer;
margin-bottom:12px;
transition:.25s;
}

.cta-btn.primary{
background:linear-gradient(90deg,#ff416c,#ff4b2b);
color:#fff;
box-shadow:0 6px 15px rgba(255,65,108,.4);
}

.cta-btn.secondary{
background:linear-gradient(90deg,#36d1dc,#5b86e5);
color:#fff;
box-shadow:0 6px 15px rgba(91,134,229,.4);
}

.cta-btn:hover{transform:translateY(-2px);}
.cta-btn:active{transform:scale(0.96);}

.footer-text{
font-size:12px;
opacity:.6;
margin-top:8px;
}
</style>

<script>
let timeLeft = 30;
let liveCount;

function startTimer(){
const timer = document.getElementById("countdown");
setInterval(()=>{
timeLeft--;
timer.textContent = "00:" + (timeLeft < 10 ? "0"+timeLeft : timeLeft);
if(timeLeft<=0){timer.textContent="ENDED";}
},1000);
}

function startLiveCounter(){
const el=document.getElementById("liveNumber");
liveCount=Math.floor(Math.random()*100)+200;
el.textContent=liveCount;
setInterval(()=>{
liveCount+=Math.floor(Math.random()*3);
el.textContent=liveCount;
},3000);
}

// 🔥 SUBSCRIBE TRACKING FOR BOTH BUTTONS
function goTelegram(){
fbq('trackCustom', 'Subscribe');

setTimeout(()=>{
window.location.href="https://t.me/+sZ_8vy_txB1iMWI1";
},300);
}

window.onload=()=>{startTimer();startLiveCounter();};
</script>

</head>

<body>

<div class="container">

<h1 class="brand-title">THE GOD FATHER</h1>

<div class="logo-container">
<img src="https://i.ibb.co/nq37JNMp/photo-2026-03-20-15-01-00.jpg">
</div>

<p class="bold-profit">DAILY FREE GIFTCODE</p>

<div class="timer-box" id="countdown">00:30</div>

<div class="live-box">
<div class="live-dot"></div>
LIVE • <span class="counter-number" id="liveNumber"></span> USERS
</div>

<button class="cta-btn primary" onclick="goTelegram()">
<i class="fab fa-telegram-plane"></i> JOIN NOW
</button>

<button class="cta-btn secondary" onclick="goTelegram()">
<i class="fab fa-telegram-plane"></i> VIP CHANNEL ACCESS
</button>

<p class="footer-text">Secure • Fast • Official</p>

</div>

</body>
</html>
